<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGHS Benazir - Report Card System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: #1e3c72;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #f0f2f5;
            font-weight: bold;
        }
        .tab.active {
            background: #1e3c72;
            color: white;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #1e3c72;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1e3c72;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        .form-group input, .form-group textarea {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }
        .term-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .term-input {
            padding: 10px;
            border: 2px solid #1e3c72;
            border-radius: 5px;
            font-size: 14px;
            flex: 1;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th {
            background: #1e3c72;
            color: white;
            padding: 12px;
            font-size: 13px;
        }
        td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        td input {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .percentage-display, .grade-display {
            text-align: center;
            font-weight: bold;
        }
        .signatures-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .signature-field {
            display: flex;
            flex-direction: column;
        }
        .signature-field label {
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }
        .signature-field input {
            padding: 10px;
            border: none;
            border-bottom: 2px solid #1e3c72;
            background: #f8f9fa;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            color: white;
        }
        .btn-primary { background: #1e3c72; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #333; }
        .action-buttons {
            text-align: center;
            margin: 20px 0;
        }
        .message {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3c72;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .apps-script-input {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .apps-script-input input {
            flex: 1;
            padding: 10px;
            border: 2px solid #1e3c72;
            border-radius: 5px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GGHS BENAZIR DISTRICT SCHOOL NAWABSHAH-1</h1>
            <p>Under the Management of SZABIST Zab-ed</p>
        </div>

        <!-- Apps Script Web App URL Input -->
        <div class="apps-script-input">
            <span style="font-weight: bold;">🔗 Apps Script URL:</span>
            <input type="text" id="appsScriptUrl" placeholder="Paste your Google Apps Script Web App URL here" value="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec">
            <button class="btn btn-primary" onclick="testConnection()">Test Connection</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('input')">➕ Add Student</button>
            <button class="tab" onclick="showTab('search')">🔍 Search</button>
            <button class="tab" onclick="showTab('preview')">👁️ Preview</button>
        </div>

        <div id="loadingSpinner" class="spinner"></div>
        <div id="messageBox" class="message"></div>

        <!-- Input Tab -->
        <div id="tab-input" class="tab-content active">
            <div class="card">
                <h2>Student Information</h2>
                <div class="term-row">
                    <span style="font-weight: bold;">Term:</span>
                    <input type="text" id="termName" class="term-input" value="1st Term">
                    <span style="color: #666;">(Editable)</span>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Student Name *</label>
                        <input type="text" id="studentName" placeholder="Enter student name">
                    </div>
                    <div class="form-group">
                        <label>Father's Name *</label>
                        <input type="text" id="fatherName" placeholder="Enter father's name">
                    </div>
                    <div class="form-group">
                        <label>Class/Section *</label>
                        <input type="text" id="studentClass" placeholder="e.g., VII-A">
                    </div>
                    <div class="form-group">
                        <label>Roll Number *</label>
                        <input type="text" id="rollNumber" placeholder="Enter roll number">
                    </div>
                    <div class="form-group">
                        <label>Days Attended</label>
                        <input type="number" id="daysAttended" placeholder="Days attended" min="0">
                    </div>
                    <div class="form-group">
                        <label>Total Working Days</label>
                        <input type="number" id="totalWorkingDays" placeholder="Total working days" value="90">
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Subject Scores</h2>
                <button class="btn btn-success" onclick="addSubjectRow()">➕ Add Subject</button>
                <div class="table-container">
                    <table id="subjectsTable">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Total Marks</th>
                                <th>Marks Obtained</th>
                                <th>%age</th>
                                <th>Grade</th>
                                <th>Teacher's Remarks</th>
                                <th>Teacher's Sign</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="subjectsBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>Comments & Signatures</h2>
                <div class="form-group">
                    <label>Class Teacher's Comments</label>
                    <textarea id="teacherComments" rows="3">Needs focus attention and consistent practice</textarea>
                </div>
                <div class="signatures-row">
                    <div class="signature-field">
                        <label>Class Teacher Sign:</label>
                        <input type="text" id="classTeacherSign" placeholder="Signature">
                    </div>
                    <div class="signature-field">
                        <label>Coordinator Sign:</label>
                        <input type="text" id="coordinatorSign" placeholder="Signature">
                    </div>
                    <div class="signature-field">
                        <label>Head Mistress Sign:</label>
                        <input type="text" id="headMistressSign" placeholder="Signature">
                    </div>
                    <div class="signature-field">
                        <label>Parent Sign:</label>
                        <input type="text" id="parentSign" placeholder="Signature">
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="saveToSheet()">💾 Save to Sheet</button>
                <button class="btn btn-success" onclick="generateAndDownloadPDF()">📥 Download PDF</button>
                <button class="btn btn-warning" onclick="clearForm()">🔄 Clear Form</button>
            </div>
        </div>

        <!-- Search Tab -->
        <div id="tab-search" class="tab-content">
            <div class="card">
                <h2>Search Student</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="searchRollNo" placeholder="Enter Roll Number" style="flex: 1; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px;">
                    <button class="btn btn-primary" onclick="searchStudent()">Search</button>
                </div>
                <div id="searchResults"></div>
            </div>
        </div>

        <!-- Preview Tab -->
        <div id="tab-preview" class="tab-content">
            <div class="card">
                <h2>Report Preview</h2>
                <div id="reportPreview" style="padding: 20px; background: white; border: 1px solid #ddd; min-height: 500px;"></div>
                <div class="action-buttons">
                    <button class="btn btn-success" onclick="generateAndDownloadPDF()">📥 Download PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Default subjects
        const defaultSubjects = [
            { name: 'English', totalMarks: 100 },
            { name: 'Urdu', totalMarks: 100 },
            { name: 'Maths', totalMarks: 100 },
            { name: 'Science', totalMarks: 100 },
            { name: 'S.S.Tudies', totalMarks: 50 },
            { name: 'Islamiyat', totalMarks: 50 },
            { name: 'Sindhi', totalMarks: 50 },
            { name: 'Computer', totalMarks: 50 }
        ];

        // Initialize on load
        window.onload = function() {
            loadSubjects();
        };

        function loadSubjects() {
            const tbody = document.getElementById('subjectsBody');
            tbody.innerHTML = '';
            defaultSubjects.forEach(subject => {
                addSubjectRow(subject.name, subject.totalMarks);
            });
        }

        function addSubjectRow(name = '', totalMarks = 100) {
            const tbody = document.getElementById('subjectsBody');
            const row = tbody.insertRow();
            row.innerHTML = `
                <td><input type="text" value="${name}" onchange="updateRow(this)"></td>
                <td><input type="number" value="${totalMarks}" onchange="updateRow(this)"></td>
                <td><input type="text" value="" onchange="updateRow(this)"></td>
                <td class="percentage-display">-</td>
                <td class="grade-display">-</td>
                <td><input type="text" placeholder="Remarks"></td>
                <td><input type="text" placeholder="Signature"></td>
                <td><button onclick="this.closest('tr').remove()" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">✖</button></td>
            `;
        }

        function updateRow(input) {
            const row = input.closest('tr');
            const inputs = row.getElementsByTagName('input');
            const marksObtained = inputs[2].value;
            const totalMarks = inputs[1].value;

            if (marksObtained.toUpperCase() === 'A') {
                row.cells[3].innerHTML = 'A';
                row.cells[4].innerHTML = '-';
                return;
            }

            const obtained = parseFloat(marksObtained) || 0;
            const total = parseFloat(totalMarks) || 0;
            
            if (total > 0) {
                const percentage = ((obtained / total) * 100).toFixed(1);
                row.cells[3].innerHTML = percentage + '%';
                
                let grade = 'F';
                if (percentage >= 90) grade = 'A+';
                else if (percentage >= 80) grade = 'A';
                else if (percentage >= 70) grade = 'B';
                else if (percentage >= 60) grade = 'C';
                else if (percentage >= 50) grade = 'D';
                else if (percentage >= 40) grade = 'E';
                
                row.cells[4].innerHTML = grade;
            }
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            
            if (tabName === 'preview') {
                showPreview();
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('messageBox');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => {
                msg.style.display = 'none';
            }, 5000);
        }

        function setLoading(show) {
            document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
        }

        // Test connection to Apps Script
        function testConnection() {
            const url = document.getElementById('appsScriptUrl').value;
            if (!url) {
                showMessage('Please enter Apps Script URL', 'error');
                return;
            }
            
            setLoading(true);
            
            // Test by sending a simple ping
            fetch(url + '?ping=1')
                .then(response => {
                    setLoading(false);
                    if (response.ok) {
                        showMessage('✅ Connection successful!', 'success');
                    } else {
                        showMessage('❌ Connection failed', 'error');
                    }
                })
                .catch(error => {
                    setLoading(false);
                    showMessage('❌ Connection error: ' + error.message, 'error');
                });
        }

        // Save to Google Sheet via Apps Script
        function saveToSheet() {
            // Validate required fields
            const required = ['studentName', 'fatherName', 'studentClass', 'rollNumber'];
            for (let field of required) {
                if (!document.getElementById(field).value) {
                    showMessage('Please fill ' + field, 'error');
                    return;
                }
            }

            const appsScriptUrl = document.getElementById('appsScriptUrl').value;
            if (!appsScriptUrl) {
                showMessage('Please enter your Apps Script URL', 'error');
                return;
            }

            // Collect all data
            const data = {
                term: document.getElementById('termName').value,
                studentName: document.getElementById('studentName').value,
                fatherName: document.getElementById('fatherName').value,
                studentClass: document.getElementById('studentClass').value,
                rollNumber: document.getElementById('rollNumber').value,
                daysAttended: document.getElementById('daysAttended').value,
                totalWorkingDays: document.getElementById('totalWorkingDays').value,
                teacherComments: document.getElementById('teacherComments').value,
                classTeacherSign: document.getElementById('classTeacherSign').value,
                coordinatorSign: document.getElementById('coordinatorSign').value,
                headMistressSign: document.getElementById('headMistressSign').value,
                parentSign: document.getElementById('parentSign').value,
                timestamp: new Date().toISOString(),
                subjects: []
            };

            // Collect subjects
            const rows = document.getElementById('subjectsBody').rows;
            for (let i = 0; i < rows.length; i++) {
                const inputs = rows[i].getElementsByTagName('input');
                data.subjects.push({
                    name: inputs[0].value,
                    totalMarks: inputs[1].value,
                    marksObtained: inputs[2].value,
                    percentage: rows[i].cells[3].innerHTML,
                    grade: rows[i].cells[4].innerHTML,
                    remarks: inputs[3].value,
                    signature: inputs[4].value
                });
            }

            setLoading(true);

            // Send to Apps Script using fetch with CORS mode
            fetch(appsScriptUrl, {
                method: 'POST',
                mode: 'no-cors', // This is important for Apps Script
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'data=' + encodeURIComponent(JSON.stringify(data))
            })
            .then(() => {
                setLoading(false);
                showMessage('✅ Data sent to Google Sheet! Check your sheet.', 'success');
            })
            .catch(error => {
                setLoading(false);
                showMessage('❌ Error: ' + error.message, 'error');
                console.error('Error:', error);
            });
        }

        // Show Preview
        function showPreview() {
            const previewDiv = document.getElementById('reportPreview');
            previewDiv.innerHTML = generateReportHTML();
        }

        // Generate and Download PDF - FIXED VERSION
        function generateAndDownloadPDF() {
            const reportHTML = generateReportHTML();
            
            // Create a styled container for PDF
            const element = document.createElement('div');
            element.innerHTML = reportHTML;
            element.style.width = '800px';
            element.style.margin = '0 auto';
            element.style.padding = '20px';
            element.style.backgroundColor = 'white';
            element.style.fontFamily = 'Arial, sans-serif';
            
            document.body.appendChild(element);

            // PDF Options - Optimized for better rendering
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: 'Report_Card_' + (document.getElementById('rollNumber').value || 'student') + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2, 
                    letterRendering: true,
                    useCORS: true,
                    logging: false,
                    allowTaint: false
                },
                jsPDF: { 
                    unit: 'in', 
                    format: 'a4', 
                    orientation: 'portrait' 
                }
            };

            // Generate PDF
            html2pdf().set(opt).from(element).save()
                .then(() => {
                    document.body.removeChild(element);
                    showMessage('✅ PDF downloaded successfully!', 'success');
                })
                .catch(error => {
                    document.body.removeChild(element);
                    showMessage('❌ PDF Error: ' + error.message, 'error');
                    console.error('PDF Error:', error);
                });
        }

        // Generate Report HTML
        function generateReportHTML() {
            const term = document.getElementById('termName').value || '1st Term';
            const studentName = document.getElementById('studentName').value || '_____________';
            const fatherName = document.getElementById('fatherName').value || '_____________';
            const studentClass = document.getElementById('studentClass').value || '_____________';
            const rollNo = document.getElementById('rollNumber').value || '_____________';
            const daysAttended = document.getElementById('daysAttended').value || '_____';
            const totalDays = document.getElementById('totalWorkingDays').value || '_____';
            const teacherComments = document.getElementById('teacherComments').value || 'Needs focus attention and consistent practice';
            
            let totalMarksSum = 0;
            let totalObtained = 0;
            let subjectsHTML = '';

            const rows = document.getElementById('subjectsBody').rows;
            for (let i = 0; i < rows.length; i++) {
                const inputs = rows[i].getElementsByTagName('input');
                const subject = inputs[0].value || '______';
                const total = inputs[1].value || '0';
                const obtained = inputs[2].value || '0';
                const percentage = rows[i].cells[3].innerHTML;
                const grade = rows[i].cells[4].innerHTML;
                const remarks = inputs[3].value || '';
                
                subjectsHTML += `
                    <tr style="border: 1px solid black;">
                        <td style="border: 1px solid black; padding: 8px; text-align: left;">${subject}</td>
                        <td style="border: 1px solid black; padding: 8px; text-align: center;">${total}</td>
                        <td style="border: 1px solid black; padding: 8px; text-align: center;">${obtained}</td>
                        <td style="border: 1px solid black; padding: 8px; text-align: center;">${percentage}</td>
                        <td style="border: 1px solid black; padding: 8px; text-align: center;">${grade}</td>
                        <td style="border: 1px solid black; padding: 8px; text-align: left;">${remarks}</td>
                        <td style="border: 1px solid black; padding: 8px; text-align: center;"></td>
                    </tr>
                `;

                if (obtained.toUpperCase() !== 'A') {
                    totalMarksSum += parseFloat(total) || 0;
                    totalObtained += parseFloat(obtained) || 0;
                } else {
                    totalMarksSum += parseFloat(total) || 0;
                }
            }

            const overallPercentage = totalMarksSum > 0 ? ((totalObtained / totalMarksSum) * 100).toFixed(1) : 0;
            let overallGrade = 'F';
            if (overallPercentage >= 90) overallGrade = 'A+';
            else if (overallPercentage >= 80) overallGrade = 'A';
            else if (overallPercentage >= 70) overallGrade = 'B';
            else if (overallPercentage >= 60) overallGrade = 'C';
            else if (overallPercentage >= 50) overallGrade = 'D';
            else if (overallPercentage >= 40) overallGrade = 'E';

            return `
                <div style="font-family: Arial; max-width: 800px; margin: 0 auto; border: 2px solid black; padding: 20px; background: white;">
                    <div style="text-align: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 20px;">
                        <div style="font-size: 20px; font-weight: bold;">GGHS BENAZIR DISTRICT SCHOOL NAWABSHAH-1</div>
                        <div style="margin: 5px 0;"><strong>Under the Management of SZABIST Zab-ed</strong></div>
                        <div style="font-size: 18px; font-weight: bold; margin: 10px 0;">${term.toUpperCase()} REPORT CARD</div>
                        <div style="font-size: 16px; font-weight: bold;">Academic Session 2025-26</div>
                    </div>

                    <div style="border: 1px solid black; padding: 15px; margin-bottom: 20px;">
                        <div style="display: flex; margin-bottom: 10px;">
                            <span style="font-weight: bold; width: 150px;">Student's Name:</span>
                            <span style="border-bottom: 1px solid black; min-width: 200px;">${studentName}</span>
                            <span style="font-weight: bold; width: 150px; margin-left: 50px;">Father's Name:</span>
                            <span style="border-bottom: 1px solid black; min-width: 200px;">${fatherName}</span>
                        </div>
                        <div style="display: flex; margin-bottom: 10px;">
                            <span style="font-weight: bold; width: 150px;">Class/Section:</span>
                            <span style="border-bottom: 1px solid black; min-width: 200px;">${studentClass}</span>
                            <span style="font-weight: bold; width: 150px; margin-left: 50px;">Roll No:</span>
                            <span style="border-bottom: 1px solid black; min-width: 200px;">${rollNo}</span>
                        </div>
                        <div style="display: flex;">
                            <span style="font-weight: bold; width: 150px;">Days Attended:</span>
                            <span style="border-bottom: 1px solid black; min-width: 200px;">${daysAttended}</span>
                            <span style="font-weight: bold; width: 150px; margin-left: 50px;">Total Working Days (${term}):</span>
                            <span style="border-bottom: 1px solid black; min-width: 200px;">${totalDays}</span>
                        </div>
                    </div>

                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                        <thead>
                            <tr style="background: #f2f2f2;">
                                <th style="border: 1px solid black; padding: 8px;">Subject</th>
                                <th style="border: 1px solid black; padding: 8px;">Total Marks</th>
                                <th style="border: 1px solid black; padding: 8px;">Marks Obtained</th>
                                <th style="border: 1px solid black; padding: 8px;">%</th>
                                <th style="border: 1px solid black; padding: 8px;">Grade</th>
                                <th style="border: 1px solid black; padding: 8px;">Subject Teacher's Remarks</th>
                                <th style="border: 1px solid black; padding: 8px;">Teacher's Sign</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${subjectsHTML}
                        </tbody>
                    </table>

                    <div style="border: 1px solid black; padding: 15px; margin-bottom: 20px;">
                        <div><strong>Overall Obtained Marks (out of ${totalMarksSum}):</strong> ${totalObtained}</div>
                        <div><strong>Percentage%:</strong> ${overallPercentage}% &nbsp;&nbsp;&nbsp; <strong>Grade:</strong> ${overallGrade}</div>
                    </div>

                    <div style="border: 1px solid black; padding: 15px; margin-bottom: 20px;">
                        <div><strong>Class Teacher's Comments:</strong></div>
                        <div style="margin-top: 10px; font-style: italic;">${teacherComments}</div>
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-top: 30px;">
                        <div style="text-align: center;">
                            <div style="border-top: 1px solid black; width: 120px; margin: 5px auto;"></div>
                            <div><strong>Class Teacher Sign</strong></div>
                        </div>
                        <div style="text-align: center;">
                            <div style="border-top: 1px solid black; width: 120px; margin: 5px auto;"></div>
                            <div><strong>Coordinator Sign</strong></div>
                        </div>
                        <div style="text-align: center;">
                            <div style="border-top: 1px solid black; width: 120px; margin: 5px auto;"></div>
                            <div><strong>Head Mistress Sign</strong></div>
                        </div>
                        <div style="text-align: center;">
                            <div style="border-top: 1px solid black; width: 120px; margin: 5px auto;"></div>
                            <div><strong>Parent Sign</strong></div>
                        </div>
                    </div>

                    <div style="text-align: right; margin-top: 20px;">
                        Date: ${new Date().toLocaleDateString()}
                    </div>
                </div>
            `;
        }

        // Search function
        function searchStudent() {
            const rollNo = document.getElementById('searchRollNo').value;
            if (!rollNo) {
                showMessage('Enter roll number', 'error');
                return;
            }
            
            showMessage('Search feature requires Apps Script backend', 'info');
        }

        function clearForm() {
            document.getElementById('termName').value = '1st Term';
            document.getElementById('studentName').value = '';
            document.getElementById('fatherName').value = '';
            document.getElementById('studentClass').value = '';
            document.getElementById('rollNumber').value = '';
            document.getElementById('daysAttended').value = '';
            document.getElementById('totalWorkingDays').value = '90';
            document.getElementById('teacherComments').value = 'Needs focus attention and consistent practice';
            document.getElementById('classTeacherSign').value = '';
            document.getElementById('coordinatorSign').value = '';
            document.getElementById('headMistressSign').value = '';
            document.getElementById('parentSign').value = '';
            loadSubjects();
        }
    </script>
</body>
</html>
